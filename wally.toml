[package]
name = "horsenuggets/luau-markdown-renderer"
description = "Renders Markdown text into Roblox Studio UI elements."
version = "0.0.3"
license = "MIT"
realm = "shared"
registry = "https://github.com/UpliftGames/wally-index"
repository = "https://github.com/horsenuggets/luau-markdown-renderer"
include = [
    "default.project.json",
    "init.luau",
    "LICENSE",
    "README.md",
    "Source",
    "Source/**",
    "wally.toml",
]
exclude = ["**"]

[dependencies]
Fusion = "elttob/fusion@0.3.0"
t = "horsenuggets/t@3.1.1-horse.0.5"

[dev-dependencies]
Testable = "horsenuggets/testable@1.1.4"
